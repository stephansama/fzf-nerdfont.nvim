repos:
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: remove-crlf
  - repo: local
    hooks:
      - id: make_lint
        name: Run Linters
        language: system
        entry: make lint
        verbose: true
      - id: make_docs
        name: Generate Docs
        language: system
        entry: make documentation
        verbose: true
